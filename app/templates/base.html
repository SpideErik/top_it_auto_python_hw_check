<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой проект{% endblock %}</title>
    <!-- Общий CSS из корневой папки static -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>
    <nav>
        {# Сюда будет подставляться навигация после логина #}
        {% block navigation %}{% endblock %}
    </nav>

    <main>
        {# Сюда будет подставляться контент других страниц #}
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 Эрик Кожемякин, индивидуальный проект
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
