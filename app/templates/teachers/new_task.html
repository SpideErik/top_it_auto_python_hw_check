{% extends "base.html" %}

{% block title %}Создание нового задания{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h1>Создать новое задание</h1>
    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Заголовок задания</label>
            <input type="text" id="title" name="title" placeholder="Например: Циклы и списки" required>
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="6" placeholder="Опишите условия, ограничения и ожидаемый результат..." required></textarea>
        </div>

        <div class="form-group">
            <label for="test_file">Файл с тестами</label>
            <input type="file" id="test_file" name="test_file" accept=".txt" required>
            <small class="form-hint">Формат: .txt (файл должен содержать входные данные выходные данные и т.д. разделение пустыми строками)</small>
        </div>

        <button type="submit" class="btn-submit">Создать задание</button>
    </form>
</div>
{% endblock %}
